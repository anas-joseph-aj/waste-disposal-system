<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .test-container { max-width: 600px; }
        .result { margin-top: 10px; padding: 10px; border: 1px solid #ddd; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>API Connectivity Test</h1>
        
        <div>
            <h3>1. Health Check</h3>
            <button onclick="testHealth()">Test Health Endpoint</button>
            <div id="healthResult" class="result" style="display:none;"></div>
        </div>

        <div>
            <h3>2. Test Login</h3>
            <input type="email" id="testEmail" placeholder="Email" value="test@example.com">
            <input type="password" id="testPassword" placeholder="Password" value="password123">
            <button onclick="testLogin()">Test Login</button>
            <div id="loginResult" class="result" style="display:none;"></div>
        </div>

        <div>
            <h3>3. Test Register</h3>
            <input type="text" id="testName" placeholder="Name" value="Test User">
            <input type="email" id="testRegEmail" placeholder="Email" value="testuser@example.com">
            <input type="tel" id="testPhone" placeholder="Phone" value="1234567890">
            <input type="password" id="testRegPassword" placeholder="Password" value="password123">
            <button onclick="testRegister()">Test Register</button>
            <div id="registerResult" class="result" style="display:none;"></div>
        </div>

        <div>
            <h3>API Base URL</h3>
            <input type="text" id="apiBase" value="http://localhost:5000/api" style="width: 100%;">
            <button onclick="updateApiBase()">Update API Base</button>
        </div>
    </div>

    <script>
        function getApiBase() {
            return document.getElementById('apiBase').value || 'http://localhost:5000/api';
        }

        function showResult(elementId, message, isSuccess) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = `result ${isSuccess ? 'success' : 'error'}`;
            el.style.display = 'block';
        }

        async function testHealth() {
            try {
                const response = await fetch('http://localhost:5000/health');
                const data = await response.json();
                showResult('healthResult', JSON.stringify(data, null, 2), response.ok);
            } catch (error) {
                showResult('healthResult', `Error: ${error.message}`, false);
            }
        }

        async function testLogin() {
            try {
                const email = document.getElementById('testEmail').value;
                const password = document.getElementById('testPassword').value;
                
                const response = await fetch(`${getApiBase()}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                showResult('loginResult', JSON.stringify(data, null, 2), response.ok);
                
                if (response.ok && data.token) {
                    localStorage.setItem('wds_auth_token_v1', data.token);
                    console.log('Token saved to localStorage');
                }
            } catch (error) {
                showResult('loginResult', `Error: ${error.message}`, false);
            }
        }

        async function testRegister() {
            try {
                const name = document.getElementById('testName').value;
                const email = document.getElementById('testRegEmail').value;
                const phone = document.getElementById('testPhone').value;
                const password = document.getElementById('testRegPassword').value;
                
                const response = await fetch(`${getApiBase()}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, password })
                });
                
                const data = await response.json();
                showResult('registerResult', JSON.stringify(data, null, 2), response.ok);
            } catch (error) {
                showResult('registerResult', `Error: ${error.message}`, false);
            }
        }

        function updateApiBase() {
            const newBase = document.getElementById('apiBase').value;
            localStorage.setItem('wds_api_base', newBase);
            showResult('healthResult', 'API Base URL updated', true);
        }

        // Test on load
        window.addEventListener('load', () => {
            testHealth();
        });
    </script>
</body>
</html>
